{% extends 'base.html' %}

{% block content %}
<style>
    .success-container {
        min-height: 70vh;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        overflow: hidden;
        border-radius: var(--border-radius);
        padding: 2rem 1rem;
    }

    /* Celebratory balloons animation */
    .balloon {
        position: absolute;
        width: 25px;
        height: 35px;
        border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
        animation: float 14s linear infinite;
        opacity: 0.25;
        z-index: 1;
    }

    .balloon:before {
        content: "";
        position: absolute;
        bottom: -8px;
        left: 50%;
        transform: translateX(-50%);
        width: 1px;
        height: 15px;
        background: rgba(255, 255, 255, 0.4);
    }

    @keyframes float {
        0% {
            transform: translateY(80vh) translateX(0) rotate(0);
            opacity: 0.25;
        }
        100% {
            transform: translateY(-20vh) translateX(calc(40px * var(--i))) rotate(calc(360deg * var(--i)));
            opacity: 0;
        }
    }

    /* Confetti animation */
    .confetti {
        position: absolute;
        width: 8px;
        height: 8px;
        opacity: 0;
        z-index: 1;
        animation: confetti-fall 6s ease-in-out infinite;
    }

    @keyframes confetti-fall {
        0% {
            transform: translateY(-20vh) rotate(0deg);
            opacity: 0.8;
        }
        100% {
            transform: translateY(80vh) rotate(360deg);
            opacity: 0;
        }
    }

    .success-card {
        background-color: var(--bg-secondary) !important;
        border: 1px solid var(--border-color) !important;
        border-radius: var(--border-radius) !important;
        color: var(--text-secondary) !important;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.3) !important;
        overflow: hidden;
        position: relative;
        max-width: 450px;
        width: 100%;
        padding: 2.5rem 2rem;
        z-index: 10;
        text-align: center;
        animation: success-card-appear 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes success-card-appear {
        0% {
            transform: scale(0.95);
            opacity: 0;
        }
        100% {
            transform: scale(1);
            opacity: 1;
        }
    }

    .success-icon-wrap {
        display: flex;
        margin: 0 auto 1.5rem auto;
        background: linear-gradient(135deg, var(--corp-success), var(--corp-success-hover));
        justify-content: center;
        align-items: center;
        width: 4.5rem;
        height: 4.5rem;
        border-radius: 50%;
        box-shadow: 0 0 20px rgba(5, 150, 105, 0.35);
        animation: success-pulse 2s infinite alternate;
    }

    @keyframes success-pulse {
        0% {
            box-shadow: 0 0 15px rgba(5, 150, 105, 0.2);
            transform: scale(1);
        }
        100% {
            box-shadow: 0 0 25px rgba(5, 150, 105, 0.5);
            transform: scale(1.05);
        }
    }

    .success-icon-wrap i {
        color: white;
        font-size: 2.25rem;
    }

    .success-title {
        color: var(--text-primary) !important;
        font-weight: 700;
        font-size: 1.5rem;
        margin-bottom: 0.75rem;
    }

    .success-message {
        color: var(--text-secondary);
        font-size: 1rem;
        line-height: 1.5;
        margin-bottom: 2rem;
    }

    .success-actions {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    /* Mobile adjustments */
    @media (max-width: 576px) {
        .success-container {
            padding: 1rem;
            min-height: 60vh;
        }
        .success-card {
            padding: 2rem 1.5rem;
        }
    }
</style>

<div class="success-container" id="success-container">
    <!-- Animated background balloons -->
    <div class="balloon" style="--i:1; background: rgba(37, 99, 235, 0.2); left: 10%;"></div>
    <div class="balloon" style="--i:2; background: rgba(5, 150, 105, 0.2); left: 25%;"></div>
    <div class="balloon" style="--i:3; background: rgba(2, 132, 199, 0.2); left: 45%;"></div>
    <div class="balloon" style="--i:4; background: rgba(217, 119, 6, 0.2); left: 65%;"></div>
    <div class="balloon" style="--i:5; background: rgba(255, 255, 255, 0.15); left: 85%;"></div>
    
    <!-- Confetti elements -->
    <div class="confetti" style="background: var(--corp-primary); left: 15%; animation-delay: 0s;"></div>
    <div class="confetti" style="background: var(--corp-success); left: 35%; animation-delay: 0.5s;"></div>
    <div class="confetti" style="background: var(--corp-info); left: 55%; animation-delay: 1s;"></div>
    <div class="confetti" style="background: var(--corp-warning); left: 75%; animation-delay: 1.5s;"></div>
    <div class="confetti" style="background: #ffffff; left: 90%; animation-delay: 2s;"></div>
    
    <div class="success-card">
        <div class="success-icon-wrap">
            <i class="fas fa-check"></i>
        </div>
        <h2 class="success-title">¡Guardado con éxito!</h2>
        <p class="success-message">{{ message }}</p>
        
        <div class="success-actions">
            <a href="{% url 'plan_de_estudio' %}" class="btn btn-primary">
                <i class="fas fa-eye me-2"></i>Ver datos guardados
            </a>
            <a href="{% url 'inicio' %}" class="btn btn-outline-secondary">
                <i class="fas fa-home me-2"></i>Volver al inicio
            </a>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const container = document.getElementById('success-container');
        if (container) {
            // Generate more confetti with random properties
            const corporateColors = ['#2563eb', '#059669', '#0284c7', '#d97706', '#ffffff'];
            for (let i = 0; i < 25; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.background = corporateColors[Math.floor(Math.random() * corporateColors.length)];
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.width = Math.random() * 8 + 4 + 'px';
                confetti.style.height = Math.random() * 8 + 4 + 'px';
                confetti.style.animationDelay = Math.random() * 4 + 's';
                confetti.style.animationDuration = Math.random() * 3 + 3 + 's';
                container.appendChild(confetti);
            }
        }
    });
</script>
{% endblock %}
